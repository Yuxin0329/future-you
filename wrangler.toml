name = "future-you-backend"
main = "worker.js"
compatibility_date = "2024-04-01"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "USERS"
id = "your_users_namespace_id"

[[kv_namespaces]]
binding = "LETTERS"
id = "your_letters_namespace_id"

[[kv_namespaces]]
binding = "PARTNERSHIPS"
id = "your_partnerships_namespace_id"

[[kv_namespaces]]
binding = "PARTNERSHIP_REQUESTS"
id = "your_partnership_requests_namespace_id"

[[kv_namespaces]]
binding = "IMAGES"
id = "your_images_namespace_id"

# 环境变量
[vars]
# JWT 密钥（生产环境请使用 wrangler secret put JWT_SECRET）
# JWT_SECRET = "your-jwt-secret-key"
CORS_ORIGIN = "*"

# 可选：绑定 R2 用于文件存储
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "future-you-images"
